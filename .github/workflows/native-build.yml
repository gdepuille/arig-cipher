name: Build Native Installers

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            artifact: arig-cipher-linux-x86_64
            type: deb
            ext: deb

          - name: Linux ARM64
            os: ubuntu-24.04-arm
            artifact: arig-cipher-linux-arm64
            type: deb
            ext: deb

          - name: Windows x86_64
            os: windows-latest
            artifact: arig-cipher-windows-x86_64
            type: msi
            ext: msi

          - name: macOS ARM64
            os: macos-14
            artifact: arig-cipher-macos-arm64
            type: dmg
            ext: dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GraalVM JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build JAR (Unix)
        if: runner.os != 'Windows'
        run: ./gradlew bootJar --no-daemon

      - name: Build JAR (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat bootJar --no-daemon

      - name: Install jpackage dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y fakeroot

      - name: Create installer (macOS / Linux)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          jpackage \
            --name "ARIG Cipher" \
            --app-version "0.0.1" \
            --input build/libs \
            --main-jar arig-cipher.jar \
            --type ${{ matrix.type }} \
            --dest dist \
            --java-options "--enable-native-access=ALL-UNNAMED" \
            --icon src/main/resources/org/arig/lucifer/fx/logo.png \
            ${{ matrix.type == 'deb' && '--linux-deb-maintainer gregory.depuille@sogelink.com' || '' }}

      - name: Create installer (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path dist
          jpackage `
            --name "ARIG Cipher" `
            --app-version "0.0.1" `
            --input build/libs `
            --main-jar arig-cipher.jar `
            --type ${{ matrix.type }} `
            --dest dist `
            --java-options "--enable-native-access=ALL-UNNAMED"

      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cd dist
          mv *.${{ matrix.ext }} ${{ matrix.artifact }}.${{ matrix.ext }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          cd dist
          Get-ChildItem -Filter "*.${{ matrix.ext }}" | Rename-Item -NewName "${{ matrix.artifact }}.${{ matrix.ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.${{ matrix.ext }}
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
