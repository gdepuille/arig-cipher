name: Build Native Installers & Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:

  # ── Installers jpackage (dmg / deb / msi) ──────────────────────────────────
  installer:
    name: Installer — ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-26.04
            artifact: arig-cipher-linux-x86_64
            type: deb
            ext: deb

          - name: Linux ARM64
            os: ubuntu-26.04-arm
            artifact: arig-cipher-linux-arm64
            type: deb
            ext: deb

          - name: Windows x86_64
            os: windows-2025
            artifact: arig-cipher-windows-x86_64
            type: app-image
            ext: zip

          - name: macOS ARM64
            os: macos-26
            artifact: arig-cipher-macos-arm64
            type: dmg
            ext: dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Liberica JDK 25 avec JavaFX
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'liberica'
          java-package: 'jdk'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Print JDK/GraalVM versions
        run: |
          echo "GRAALVM_HOME: ${GRAALVM_HOME}"
          echo "JAVA_HOME: ${JAVA_HOME}"
          java --version
          native-image --version

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Get version
        id: version
        shell: bash
        run: echo "version=$(./gradlew printVersion -q --no-daemon)" >> $GITHUB_OUTPUT

      - name: Build JAR (Unix)
        if: runner.os != 'Windows'
        run: ./gradlew bootJar --no-daemon

      - name: Build JAR (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat bootJar --no-daemon

      - name: Install jpackage dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y fakeroot

      - name: Create installer (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          jpackage \
            --name "ARIG Cipher" \
            --app-version "${{ steps.version.outputs.version }}" \
            --input build/libs \
            --main-jar arig-cipher.jar \
            --type ${{ matrix.type }} \
            --dest dist \
            --java-options "--enable-native-access=ALL-UNNAMED" \
            --icon src/main/resources/org/arig/lucifer/fx/logo.icns

      - name: Create installer (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          jpackage \
            --name "ARIG Cipher" \
            --app-version "${{ steps.version.outputs.version }}" \
            --input build/libs \
            --main-jar arig-cipher.jar \
            --type ${{ matrix.type }} \
            --dest dist \
            --java-options "--enable-native-access=ALL-UNNAMED" \
            --icon src/main/resources/org/arig/lucifer/fx/logo.png \
            --linux-deb-maintainer gregory.depuille@sogelink.com

      - name: Create installer (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path dist
          jpackage `
            --name "ARIG Cipher" `
            --app-version "${{ steps.version.outputs.version }}" `
            --input build/libs `
            --main-jar arig-cipher.jar `
            --type ${{ matrix.type }} `
            --dest dist `
            --java-options "--enable-native-access=ALL-UNNAMED" `
            --icon src/main/resources/org/arig/lucifer/fx/logo.ico

      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: mv dist/*.${{ matrix.ext }} dist/${{ matrix.artifact }}.${{ matrix.ext }}

      - name: Package artifact (Windows — zip app-image)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path "dist\ARIG Cipher" -DestinationPath "dist\${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.${{ matrix.ext }}
          retention-days: 30

  # ── Binaires natifs auto-portants via Liberica NIK + JavaFX ────────────────
  native-binary:
    name: Binary — ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-26.04
            artifact: arig-cipher-linux-x86_64-bin
            binary: arig-cipher

          #- name: Linux ARM64
          #  os: ubuntu-26.04-arm
          #  artifact: arig-cipher-linux-arm64-bin
          #  binary: arig-cipher

          - name: Windows x86_64
            os: windows-2025
            artifact: arig-cipher-windows-x86_64-bin
            binary: arig-cipher.exe

          - name: macOS ARM64
            os: macos-26
            artifact: arig-cipher-macos-arm64-bin
            binary: arig-cipher

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Liberica NIK 25 avec JavaFX
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'liberica'
          java-package: 'jdk+fx'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-nik-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-nik-

      - name: Install JavaFX native dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y \
            libasound2-dev libavcodec-dev libavformat-dev libavutil-dev \
            libgl-dev libgtk-3-dev libpango1.0-dev libxtst-dev

      - name: Build native binary (Unix)
        if: runner.os != 'Windows'
        run: ./gradlew distNative --no-daemon

      - name: Build native binary (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat distNative --no-daemon

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.binary }}
          retention-days: 30

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.binary }}
          retention-days: 30

  # ── Release GitHub (sur tag v*) ────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [installer, native-binary]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-26.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
