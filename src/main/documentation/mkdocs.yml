site_name: ARIG Cipher
site_description: Application desktop de chiffrement de fichiers par l'algorithme Lucifer — projet ARIG Robotique
site_author: ARIG Robotique
site_url: https://gdepuille.github.io/arig-cipher/
docs_dir: docs
repo_url: https://github.com/gdepuille/arig-cipher
repo_name: gdepuille/arig-cipher

theme:
  name: material
  language: fr
  logo: assets/images/logo.png
  favicon: assets/images/logo.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/brightness-7
        name: Basculer en mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/brightness-4
        name: Basculer en mode clair
  features:
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

plugins:
  - search:
      lang: fr

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - attr_list
  - tables
  - toc:
      permalink: true
      title: Sur cette page

nav:
  - Accueil: index.md
  - Installation: guide/getting-started.md
  - Utilisation: guide/usage.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/gdepuille/arig-cipher
      name: ARIG Cipher sur GitHub
  generator: false

copyright: "© ARIG Robotique — Sogelink Confidential"
